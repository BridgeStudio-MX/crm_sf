name: twenty-local

# Corre Twenty en local dentro de Docker usando la MISMA imagen de produccion
# (la de GHCR), sin Caddy: expone el server en http://localhost:3000.
# No compila nada; baja la imagen ya construida.
#
#   docker login ghcr.io -u TU_USUARIO_GITHUB        # token con read:packages
#   docker compose -f deploy/docker-compose.local.yml --env-file deploy/.env.local up -d
#   # http://localhost:3000

services:
  server:
    image: ghcr.io/bridgestudio-mx/crm_sf:${TAG:-latest}
    platform: linux/amd64 # la imagen se construye solo para amd64; en Mac ARM corre por emulacion
    volumes:
      - server-local-data:/app/packages/twenty-server/.local-storage
    ports:
      - "3000:3000"
    environment:
      NODE_PORT: 3000
      PG_DATABASE_URL: postgres://postgres:postgres@db:5432/default
      SERVER_URL: http://localhost:3000
      REDIS_URL: redis://redis:6379
      STORAGE_TYPE: local
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: curl --fail http://localhost:3000/healthz
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  worker:
    image: ghcr.io/bridgestudio-mx/crm_sf:${TAG:-latest}
    platform: linux/amd64 # ver nota en server
    volumes:
      - server-local-data:/app/packages/twenty-server/.local-storage
    command: ["yarn", "worker:prod"]
    environment:
      PG_DATABASE_URL: postgres://postgres:postgres@db:5432/default
      SERVER_URL: http://localhost:3000
      REDIS_URL: redis://redis:6379
      DISABLE_DB_MIGRATIONS: "true"
      DISABLE_CRON_JOBS_REGISTRATION: "true"
      STORAGE_TYPE: local
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    depends_on:
      db:
        condition: service_healthy
      server:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16
    volumes:
      - db-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: default
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    healthcheck:
      test: pg_isready -U postgres -h localhost -d postgres
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis
    command: ["--maxmemory-policy", "noeviction"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  db-data:
  server-local-data:
